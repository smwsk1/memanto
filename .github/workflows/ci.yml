name: CI

on:
  push:
    branches: main
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  lint-and-type-check:
    if: github.event_name == 'push' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run ruff linting
      run: uv run ruff check .

    - name: Run ruff formatting check
      run: uv run ruff format --check .

    - name: Run mypy type checking
      run: uv run mypy .

  test:
    needs: lint-and-type-check
    if: github.event_name == 'push' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Create version fallback
      run: echo '__version__ = "0.0.0.dev0"' > memanto/app/_version.py

    # Placeholder key satisfies unit/API tests (mocked Moorcheh). Live E2E in
    # tests/test_e2e.py is skipped unless MOORCHEH_API_KEY is a real key.
    # To run E2E in CI: add repository secret MOORCHEH_API_KEY and set:
    #   env:
    #     MOORCHEH_API_KEY: ${{ secrets.MOORCHEH_API_KEY }}
    - name: Run tests
      env:
        MOORCHEH_API_KEY: test-api-key
      run: uv run pytest tests/ -v --tb=short
